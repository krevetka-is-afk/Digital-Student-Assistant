services:
  postgres_master:
    container_name: web_data
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: db_name
      POSTGRES_USER: db_user
      POSTGRES_PASSWORD: db_pass
    profiles: ["dev"]
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U db_user -d db_name"]
      interval: 20s
      timeout: 10s
      retries: 5
    restart: unless-stopped


  # vector_db:
  #   image:
  #   ports:
  #     - "5434:5432"
  #   environment:
  #     - name=value
  #   profiles:
  #     - ["dev"]
  #   volumes:
  #     - volumeName:containerPath:ro
  #   healthcheck:
  #     test: ["executable", "arg"]
  #     interval: 20s
  #     timeout: 10s
  #     retries: 5
  #     start_period: unless-stopped

  web:
    container_name: web_service
    build:
      context: ../src/web
    depends_on:
      postgres_master:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - path: ../src/web/.env
        required: false
    environment:
      - PYTHONUNBUFFERED=1
      - DJANGO_SETTINGS_MODULE=config.settings.dev
      - DATABASE_URL=${DEV_DATABASE_URL:-postgresql+psycopg2://db_user:db_pass@postgres_master:5432/db_name}
      - ML_SERVICE_URL=${ML_SERVICE_URL:-http://ml:8000}
    profiles: ["dev"]
    # volumes:
    #   - volumes volumes
    # tmpfs:
    #   - some
    read_only: true
    security_opt:
      - no-new-privileges:true
      - seccomp=../security/seccomp/default.json
    cap_drop:
      - ALL
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import sys,urllib.request as u; u.urlopen('http://127.0.0.1:8000/health/').read(); sys.exit(0)"]
      interval: 30s
      timeout: 3s
      retries: 3
    user: "1000:1000"


  ml:
    container_name: ml_service
    build:
      context: ../src/ml
    # depends_on:
    #   vector_db:
    #     condition: service_healthy
    ports:
      - "8001:8000"
    env_file:
      - path: ../src/ml/.env
        required: false
    environment:
      - PYTHONUNBUFFERED=1
      - OUTBOX_BASE_URL=${OUTBOX_BASE_URL:-http://web:8000}
      - OUTBOX_CONSUMER=${OUTBOX_CONSUMER:-ml}
      - OUTBOX_AUTH_HEADER=${OUTBOX_AUTH_HEADER:-}
      - OUTBOX_BATCH_SIZE=${OUTBOX_BATCH_SIZE:-100}
      - OUTBOX_POLL_INTERVAL_SEC=${OUTBOX_POLL_INTERVAL_SEC:-5}
      - ML_ENABLE_BACKGROUND_POLLER=${ML_ENABLE_BACKGROUND_POLLER:-false}
      - ML_INDEX_STATE_PATH=${ML_INDEX_STATE_PATH:-/app/data/ml-index.json}
    profiles: ["dev"]
    volumes:
      - app-data:/app/data
    tmpfs:
      - /tmp:rw,size=64m
    read_only: true
    security_opt:
      - no-new-privileges:true
      - seccomp=../security/seccomp/default.json
    cap_drop:
      - ALL
    pids_limit: 120
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import sys,urllib.request as u; u.urlopen('http://127.0.0.1:8000/health').read(); sys.exit(0)"]
      interval: 30s
      timeout: 3s
      retries: 3
    user: "1000:1000"

  neo4j:
    container_name: graph_db
    image: neo4j:5-community
    environment:
      - NEO4J_AUTH=${NEO4J_AUTH:-neo4j/test}
    ports:
      - "7474:7474"
      - "7687:7687"
    profiles: ["dev"]
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD-SHELL", "AUTH=\"$${NEO4J_AUTH}\"; USER=$${AUTH%%/*}; PASS=$${AUTH#*/}; cypher-shell -a bolt://localhost:7687 -u \"$${USER}\" -p \"$${PASS}\" 'RETURN 1' >/dev/null 2>&1"]
      interval: 20s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  graph:
    container_name: graph_service
    build:
      context: ../src/graph
    depends_on:
      neo4j:
        condition: service_healthy
    ports:
      - "8002:8002"
    environment:
      - PYTHONUNBUFFERED=1
      - NEO4J_URI=${NEO4J_URI:-bolt://neo4j:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-test}
      - OUTBOX_BASE_URL=${OUTBOX_BASE_URL:-http://web:8000}
      - OUTBOX_CONSUMER=graph
      - OUTBOX_AUTH_HEADER=${OUTBOX_AUTH_HEADER:-}
      - OUTBOX_BATCH_SIZE=${OUTBOX_BATCH_SIZE:-100}
      - OUTBOX_POLL_INTERVAL_SEC=${OUTBOX_POLL_INTERVAL_SEC:-5}
      - GRAPH_ENABLE_BACKGROUND_POLLER=${GRAPH_ENABLE_BACKGROUND_POLLER:-false}
    profiles: ["dev"]
    volumes:
      - graph-data:/app/var
    tmpfs:
      - /tmp:rw,size=64m
    read_only: true
    security_opt:
      - no-new-privileges:true
      - seccomp=../security/seccomp/default.json
    cap_drop:
      - ALL
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import sys,urllib.request as u; u.urlopen('http://127.0.0.1:8002/health').read(); sys.exit(0)"]
      interval: 30s
      timeout: 3s
      retries: 3
    user: "1000:1000"

volumes:
  app-data:
    driver: local
  graph-data:
    driver: local
  neo4j-data:
    driver: local
  pg-data:
    driver: local
