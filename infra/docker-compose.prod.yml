services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ../src/web/.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dsa}
      POSTGRES_USER: ${POSTGRES_USER:-dsa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dsa}
    volumes:
      - postgres-prod:/var/lib/postgresql/data

  web:
    build:
      context: ../src/web
    restart: unless-stopped
    env_file:
      - ../src/web/.env
    environment:
      PYTHONUNBUFFERED: "1"
      DJANGO_SETTINGS_MODULE: config.settings.prod
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://dsa:dsa@postgres:5432/dsa}
      ML_SERVICE_URL: ${ML_SERVICE_URL:-http://ml:8000}
    depends_on:
      - postgres
      - ml
    command: >
      sh -c "python manage.py migrate --noinput &&
      python manage.py runserver 0.0.0.0:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import sys,urllib.request as u; u.urlopen('http://127.0.0.1:8000/health/').read(); sys.exit(0)"]
      interval: 30s
      timeout: 3s
      retries: 5

  ml:
    build:
      context: ../src/ml
    restart: unless-stopped
    env_file:
      - ../src/ml/.env
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]

  neo4j:
    image: neo4j:5-community
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/test}
    volumes:
      - neo4j-prod:/data
    healthcheck:
      test: ["CMD-SHELL", "AUTH=\"$NEO4J_AUTH\"; USER=${AUTH%%/*}; PASS=${AUTH#*/}; cypher-shell -a bolt://localhost:7687 -u \"$USER\" -p \"$PASS\" 'RETURN 1' >/dev/null 2>&1"]
      interval: 20s
      timeout: 10s
      retries: 10

  graph:
    build:
      context: ../src/graph
    restart: unless-stopped
    env_file:
      - ../src/graph/.env
    depends_on:
      neo4j:
        condition: service_healthy
      web:
        condition: service_healthy
    volumes:
      - graph-prod:/app/var
    environment:
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-test}
      OUTBOX_BASE_URL: ${OUTBOX_BASE_URL:-http://web:8000}
      OUTBOX_CONSUMER: graph
      OUTBOX_AUTH_HEADER: ${OUTBOX_AUTH_HEADER:-}
      OUTBOX_BATCH_SIZE: ${OUTBOX_BATCH_SIZE:-100}
      OUTBOX_POLL_INTERVAL_SEC: ${OUTBOX_POLL_INTERVAL_SEC:-5}
      GRAPH_ENABLE_BACKGROUND_POLLER: ${GRAPH_ENABLE_BACKGROUND_POLLER:-false}
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8002"]

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres-prod:
  graph-prod:
  neo4j-prod:
