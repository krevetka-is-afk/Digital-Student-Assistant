services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ./.env.prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dsa} -d ${POSTGRES_DB:-dsa}"]
      interval: 20s
      timeout: 5s
      start_period: 10s
      retries: 5

  web:
    build:
      context: ../src/web
    restart: unless-stopped
    env_file:
      - ./.env.prod
    environment:
      PYTHONUNBUFFERED: "1"
      DJANGO_SETTINGS_MODULE: config.settings.prod
      DATABASE_URL: ${DATABASE_URL:-}
      ML_SERVICE_URL: ${ML_SERVICE_URL:-http://ml:8000}
      DJANGO_BEHIND_PROXY: "true"
      DJANGO_SECURE_SSL_REDIRECT: ${DJANGO_SECURE_SSL_REDIRECT:-false}
      DJANGO_LOG_LEVEL: ${DJANGO_LOG_LEVEL:-INFO}
      DSA_BOOTSTRAP_IMPORT_IF_EMPTY: ${DSA_BOOTSTRAP_IMPORT_IF_EMPTY:-false}
      DSA_BOOTSTRAP_XLSX_PATH: ${DSA_BOOTSTRAP_XLSX_PATH:-/app/bootstrap-data/EPP.xlsx}
      DSA_BOOTSTRAP_ALLOW_MISSING_XLSX: ${DSA_BOOTSTRAP_ALLOW_MISSING_XLSX:-true}
      DSA_BOOTSTRAP_FAIL_ON_IMPORT_ERRORS: ${DSA_BOOTSTRAP_FAIL_ON_IMPORT_ERRORS:-true}
      DSA_BOOTSTRAP_STATE_FILE: ${DSA_BOOTSTRAP_STATE_FILE:-/var/lib/dsa/bootstrap/state.json}
    depends_on:
      postgres:
        condition: service_healthy
      ml:
        condition: service_healthy
    volumes:
      - ${BOOTSTRAP_DATA_HOST_DIR:-../.bootstrap-data}:/app/bootstrap-data:ro
      - bootstrap-state:/var/lib/dsa/bootstrap
    command:
      - sh
      - -ec
      - >
        python manage.py migrate --noinput &&
        python manage.py bootstrap_epp_if_empty &&
        gunicorn config.wsgi:application
        --bind 0.0.0.0:8000
        --workers ${WEB_CONCURRENCY:-3}
        --timeout ${WEB_TIMEOUT_SECONDS:-60}
        --graceful-timeout ${WEB_GRACEFUL_TIMEOUT_SECONDS:-30}
        --access-logfile -
        --error-logfile -
    stop_grace_period: 45s
    read_only: true
    tmpfs:
      - /tmp:rw,size=64m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "python", "-c", "import sys,urllib.request as u; req=u.Request('http://127.0.0.1:8000/ready/', headers={'X-Forwarded-Proto':'https'}); u.urlopen(req).read(); sys.exit(0)"]
      interval: 30s
      timeout: 3s
      start_period: 40s
      retries: 5

  ml:
    build:
      context: ../src/ml
    restart: unless-stopped
    env_file:
      - ./.env.prod
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    read_only: true
    tmpfs:
      - /tmp:rw,size=64m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "python", "-c", "import sys,urllib.request as u; u.urlopen('http://127.0.0.1:8000/ready').read(); sys.exit(0)"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 5

  neo4j:
    image: neo4j:5-community
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:?NEO4J_AUTH is required}
    volumes:
      - neo4j-prod:/data
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "AUTH=\"$$NEO4J_AUTH\"; USER=$${AUTH%%/*}; PASS=$${AUTH#*/}; cypher-shell -a bolt://localhost:7687 -u \"$$USER\" -p \"$$PASS\" 'RETURN 1' >/dev/null 2>&1"]
      interval: 20s
      timeout: 10s
      start_period: 15s
      retries: 10

  graph:
    build:
      context: ../src/graph
    restart: unless-stopped
    env_file:
      - ./.env.prod
    depends_on:
      neo4j:
        condition: service_healthy
      web:
        condition: service_healthy
    volumes:
      - graph-prod:/app/var
    environment:
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USER: ${NEO4J_USER:?NEO4J_USER is required}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?NEO4J_PASSWORD is required}
      OUTBOX_BASE_URL: ${OUTBOX_BASE_URL:-http://web:8000}
      OUTBOX_CONSUMER: graph
      OUTBOX_AUTH_HEADER: ${OUTBOX_AUTH_HEADER:-}
      OUTBOX_BATCH_SIZE: ${OUTBOX_BATCH_SIZE:-100}
      OUTBOX_POLL_INTERVAL_SEC: ${OUTBOX_POLL_INTERVAL_SEC:-5}
      GRAPH_ENABLE_BACKGROUND_POLLER: ${GRAPH_ENABLE_BACKGROUND_POLLER:-false}
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8002"]
    read_only: true
    tmpfs:
      - /tmp:rw,size=64m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "python", "-c", "import sys,urllib.request as u; u.urlopen('http://127.0.0.1:8002/ready').read(); sys.exit(0)"]
      interval: 30s
      timeout: 3s
      start_period: 20s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/acme:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    read_only: true
    tmpfs:
      - /var/cache/nginx:rw,size=32m
      - /var/run:rw,size=8m
      - /tmp:rw,size=16m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE

volumes:
  postgres-prod:
  graph-prod:
  neo4j-prod:
  bootstrap-state:
