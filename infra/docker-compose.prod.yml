services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ./.env.prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dsa} -d ${POSTGRES_DB:-dsa}"]
      interval: 20s
      timeout: 5s
      start_period: 10s
      retries: 5

  web:
    image: ${WEB_IMAGE:-infra-web}
    build:
      context: ../src/web
    restart: unless-stopped
    env_file:
      - ./.env.prod
    environment:
      PYTHONUNBUFFERED: "1"
      DJANGO_SETTINGS_MODULE: config.settings.prod
      DATABASE_URL: ${DATABASE_URL:-}
      ML_SERVICE_URL: ${ML_SERVICE_URL:-}
      DJANGO_BEHIND_PROXY: "true"
      DJANGO_SECURE_SSL_REDIRECT: ${DJANGO_SECURE_SSL_REDIRECT:-false}
      DJANGO_LOG_LEVEL: ${DJANGO_LOG_LEVEL:-INFO}
      DSA_BOOTSTRAP_IMPORT_IF_EMPTY: ${DSA_BOOTSTRAP_IMPORT_IF_EMPTY:-false}
      DSA_BOOTSTRAP_XLSX_PATH: ${DSA_BOOTSTRAP_XLSX_PATH:-/app/bootstrap-data/EPP.xlsx}
      DSA_BOOTSTRAP_ALLOW_MISSING_XLSX: ${DSA_BOOTSTRAP_ALLOW_MISSING_XLSX:-true}
      DSA_BOOTSTRAP_FAIL_ON_IMPORT_ERRORS: ${DSA_BOOTSTRAP_FAIL_ON_IMPORT_ERRORS:-true}
      DSA_BOOTSTRAP_STATE_FILE: ${DSA_BOOTSTRAP_STATE_FILE:-/var/lib/dsa/bootstrap/state.json}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ${BOOTSTRAP_DATA_HOST_DIR:-../.bootstrap-data}:/app/bootstrap-data:ro
      - bootstrap-state:/var/lib/dsa/bootstrap
      - staticfiles:/app/staticfiles
    command:
      - sh
      - -ec
      - >
        python manage.py collectstatic --noinput &&
        python manage.py migrate --noinput &&
        python manage.py bootstrap_epp_if_empty &&
        gunicorn config.wsgi:application
        --bind 0.0.0.0:8000
        --workers ${WEB_CONCURRENCY:-3}
        --timeout ${WEB_TIMEOUT_SECONDS:-60}
        --graceful-timeout ${WEB_GRACEFUL_TIMEOUT_SECONDS:-30}
        --access-logfile -
        --error-logfile -
    stop_grace_period: 45s
    read_only: true
    tmpfs:
      - /tmp:rw,size=64m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "python", "-c", "import sys,urllib.request as u; req=u.Request('http://127.0.0.1:8000/ready/', headers={'X-Forwarded-Proto':'https'}); u.urlopen(req).read(); sys.exit(0)"]
      interval: 30s
      timeout: 3s
      start_period: 40s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/acme:/var/www/certbot:ro
      - staticfiles:/var/www/staticfiles:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    read_only: true
    tmpfs:
      - /var/cache/nginx:rw,size=32m
      - /var/run:rw,size=8m
      - /tmp:rw,size=16m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE

volumes:
  postgres-prod:
  bootstrap-state:
  staticfiles:
