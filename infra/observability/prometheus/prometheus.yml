global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: dsa-web
    metrics_path: /metrics/
    static_configs:
      - targets:
          - web:8000

  - job_name: dsa-ml
    metrics_path: /metrics
    static_configs:
      - targets:
          - ml:8000

  - job_name: dsa-graph
    metrics_path: /metrics
    static_configs:
      - targets:
          - graph:8002
