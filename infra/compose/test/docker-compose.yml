name: dsa-test

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dsa
      POSTGRES_USER: dsa
      POSTGRES_PASSWORD: dsa
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dsa -d dsa"]
      interval: 3s
      timeout: 3s
      retries: 20

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: "neo4j/test"
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -a bolt://localhost:7687 -u neo4j -p test 'RETURN 1' >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 30

  web:
    build:
      context: ../src/web
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.test
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_NAME: dsa
      DATABASE_USER: dsa
      DATABASE_PASSWORD: dsa
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      bash -lc "python manage.py migrate --noinput && pytest -q -m 'not e2e'"

  ml:
    build:
      context: ../src/ml
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: dsa
      POSTGRES_USER: dsa
      POSTGRES_PASSWORD: dsa
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: test
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    command: >
      bash -lc "pytest -q -m 'not e2e'"

  graph:
    build:
      context: ../src/graph
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: dsa
      POSTGRES_USER: dsa
      POSTGRES_PASSWORD: dsa
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: test
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    command: >
      bash -lc "python -m app.main"
