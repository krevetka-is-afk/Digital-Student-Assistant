name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or SHA to deploy"
        required: true
        default: "main"
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-and-push-images:
    name: Build and push production images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    outputs:
      target_sha: ${{ steps.meta.outputs.target_sha }}
      image_prefix: ${{ steps.meta.outputs.image_prefix }}
      target_ref: ${{ steps.meta.outputs.target_ref }}
    steps:
      - name: Checkout target ref
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref || github.sha }}

      - name: Compute image metadata
        id: meta
        run: |
          owner_lc="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          repo_lc="$(printf '%s' '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')"
          echo "target_ref=${{ github.event.inputs.ref || github.sha }}" >> "$GITHUB_OUTPUT"
          echo "target_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "image_prefix=ghcr.io/${owner_lc}/${repo_lc}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: src/web
          push: true
          tags: |
            ${{ steps.meta.outputs.image_prefix }}-web:${{ steps.meta.outputs.target_sha }}
            ${{ steps.meta.outputs.image_prefix }}-web:main-latest

      - name: Build and push ml image
        uses: docker/build-push-action@v6
        with:
          context: src/ml
          push: true
          tags: |
            ${{ steps.meta.outputs.image_prefix }}-ml:${{ steps.meta.outputs.target_sha }}
            ${{ steps.meta.outputs.image_prefix }}-ml:main-latest

      - name: Build and push graph image
        uses: docker/build-push-action@v6
        with:
          context: src/graph
          push: true
          tags: |
            ${{ steps.meta.outputs.image_prefix }}-graph:${{ steps.meta.outputs.target_sha }}
            ${{ steps.meta.outputs.image_prefix }}-graph:main-latest

  deploy:
    name: Deploy over SSH
    needs: build-and-push-images
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: production
    permissions:
      contents: read
      packages: read

    steps:
      - name: Deploy and smoke-check on server
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_SSH_PORT }}
          command_timeout: 40m
          script: |
            set -euo pipefail

            APP_DIR="${{ secrets.PROD_APP_DIR }}"
            TARGET_REF="${{ needs.build-and-push-images.outputs.target_ref }}"
            TARGET_SHA="${{ needs.build-and-push-images.outputs.target_sha }}"
            IMAGE_PREFIX="${{ needs.build-and-push-images.outputs.image_prefix }}"
            PUBLIC_HOST="${{ secrets.PROD_SSH_HOST }}"
            PUBLIC_BASE_URL="http://${{ secrets.PROD_SSH_HOST }}"

            cd "$APP_DIR"

            git fetch --all --prune --tags
            if git show-ref --verify --quiet "refs/remotes/origin/$TARGET_REF"; then
              git checkout -B "$TARGET_REF" "origin/$TARGET_REF"
              git pull --ff-only origin "$TARGET_REF"
            else
              git checkout --detach "$TARGET_REF"
            fi

            if [ ! -f infra/.env.prod ]; then
              cp infra/.env.prod.example infra/.env.prod
              chmod 600 infra/.env.prod
            fi

            set_env_key() {
              local key="$1"
              local value="$2"
              if grep -qE "^${key}=" infra/.env.prod; then
                sed -i "s|^${key}=.*|${key}=${value}|" infra/.env.prod
              else
                printf "%s=%s\n" "$key" "$value" >> infra/.env.prod
              fi
            }

            set_env_key "DJANGO_ALLOWED_HOSTS" "$PUBLIC_HOST,localhost,127.0.0.1"
            set_env_key "DJANGO_CSRF_TRUSTED_ORIGINS" "http://$PUBLIC_HOST,http://localhost"
            set_env_key "DJANGO_SECURE_SSL_REDIRECT" "false"
            set_env_key "DJANGO_SESSION_COOKIE_SECURE" "false"
            set_env_key "DJANGO_CSRF_COOKIE_SECURE" "false"

            cat > infra/nginx/default.conf <<EOF
            server {
                listen 80;
                server_name ${PUBLIC_HOST};
                server_tokens off;

                location /.well-known/acme-challenge/ {
                    root /var/www/certbot;
                }

                client_max_body_size 25m;

                location / {
                    proxy_pass http://web:8000;
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Host \$host;
                    proxy_set_header X-Forwarded-Port \$server_port;
                    proxy_set_header X-Forwarded-Proto http;
                    proxy_http_version 1.1;
                }
            }
            EOF

            WEB_IMAGE="${IMAGE_PREFIX}-web:${TARGET_SHA}"
            ML_IMAGE="${IMAGE_PREFIX}-ml:${TARGET_SHA}"
            GRAPH_IMAGE="${IMAGE_PREFIX}-graph:${TARGET_SHA}"

            echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            WEB_IMAGE="$WEB_IMAGE" \
            ML_IMAGE="$ML_IMAGE" \
            GRAPH_IMAGE="$GRAPH_IMAGE" \
            docker compose -f infra/docker-compose.prod.yml --env-file infra/.env.prod pull web ml graph

            WEB_IMAGE="$WEB_IMAGE" \
            ML_IMAGE="$ML_IMAGE" \
            GRAPH_IMAGE="$GRAPH_IMAGE" \
            docker compose -f infra/docker-compose.prod.yml --env-file infra/.env.prod up -d --no-build --remove-orphans
            docker logout ghcr.io || true

            ENV_FILE=infra/.env.prod \
            COMPOSE_FILE=infra/docker-compose.prod.yml \
            PUBLIC_BASE_URL="$PUBLIC_BASE_URL" \
            scripts/smoke-prod.sh
