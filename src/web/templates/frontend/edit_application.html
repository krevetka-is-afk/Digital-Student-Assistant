{% extends "base.html" %}

{% block title %}Редактировать заявку — Digital Student Assistant{% endblock %}

{% block content %}

<!-- Breadcrumb -->
<div class="mb-6">
  <a href="{% url 'frontend:project_list' %}"
     class="inline-flex items-center gap-1 text-sm text-gray-500 hover:text-gray-900 transition-colors">
    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
    </svg>
    Мои заявки
  </a>
</div>

<div class="max-w-2xl">

  <!-- Header -->
  <div class="mb-6">
    <h1 class="text-xl font-semibold text-gray-900">Редактировать заявку</h1>
    <p class="mt-1 text-sm text-gray-500">
      Проект: <a href="{% url 'frontend:project_detail' project.pk %}"
                 class="text-blue-600 hover:underline">{{ project.title }}</a>
    </p>
  </div>

  <!-- Form -->
  <div class="bg-white border border-gray-200 rounded-xl p-6">
    <form method="post">
      {% csrf_token %}

      <div class="mb-6">
        <label for="motivation" class="block text-sm font-medium text-gray-700 mb-1">
          Мотивация <span class="text-gray-400 font-normal">(необязательно)</span>
        </label>
        <textarea
          id="motivation"
          name="motivation"
          rows="6"
          placeholder="Расскажите, почему вас заинтересовал этот проект и что вы можете привнести в команду..."
          class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg bg-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none transition-colors"
          style="font-family:inherit;line-height:1.5;">{{ application.motivation }}</textarea>
      </div>

      <div class="flex items-center gap-3">
        <button type="submit"
                class="px-5 py-2 rounded-lg text-sm font-semibold bg-blue-600 text-white hover:bg-blue-700 transition-colors">
          Сохранить
        </button>
        <a href="{% url 'frontend:project_list' %}"
           class="px-5 py-2 rounded-lg text-sm font-medium text-gray-600 bg-gray-100 hover:bg-gray-200 transition-colors">
          Отмена
        </a>
      </div>
    </form>
  </div>

</div>

{% endblock %}
