{% comment %}
  Context: pk (project pk), bookmarked_ids (set, optional)
{% endcomment %}
{% load frontend_extras %}
<button
  class="bookmark-btn p-1 rounded-md transition-colors"
  data-pk="{{ pk }}"
  data-bookmarked="{% if bookmarked_ids and pk in bookmarked_ids %}true{% else %}false{% endif %}"
  onclick="toggleBookmark(this)"
  title="В закладки"
  style="background:none;border:none;cursor:pointer;line-height:0;"
>
  <!-- outline icon (not bookmarked) -->
  <svg class="bm-icon-outline w-4 h-4 text-gray-300 hover:text-yellow-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"
       style="{% if bookmarked_ids and pk in bookmarked_ids %}display:none{% endif %}">
    <path stroke-linecap="round" stroke-linejoin="round" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z" />
  </svg>
  <!-- filled icon (bookmarked) -->
  <svg class="bm-icon-filled w-4 h-4 text-yellow-400" fill="currentColor" viewBox="0 0 24 24"
       style="{% if bookmarked_ids and pk in bookmarked_ids %}{% else %}display:none{% endif %}">
    <path d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z" />
  </svg>
</button>
